name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      tarball_url:
        description: 'R2 presigned URL for encrypted source tarball (15 min TTL)'
        required: true
      version:
        description: 'Version string (must match the version in the tarballed package.json)'
        required: true

# Gives the workflow token permission to create a release.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout this repo (workflow + decrypt script)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Download encrypted tarball
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ inputs.tarball_url }}" -OutFile tarball.tar.gz.enc
          $size = (Get-Item tarball.tar.gz.enc).Length
          Write-Host "Downloaded $size bytes"

      - name: Decrypt
        shell: pwsh
        env:
          WIN_BUILD_ENCRYPTION_KEY: ${{ secrets.WIN_BUILD_ENCRYPTION_KEY }}
        run: node scripts/decrypt.mjs tarball.tar.gz.enc tarball.tar.gz

      - name: Extract
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path source | Out-Null
          tar -xzf tarball.tar.gz -C source
          Get-ChildItem source | Format-Table -AutoSize

      - name: Verify version matches input
        shell: pwsh
        run: |
          $pkg = Get-Content source/package.json -Raw | ConvertFrom-Json
          if ($pkg.version -ne "${{ inputs.version }}") {
            Write-Error "Tarball package.json version ($($pkg.version)) does not match input (${{ inputs.version }})"
            exit 1
          }
          Write-Host "Version check OK: $($pkg.version)"

      - name: Install deps
        # electron-builder needs node_modules on disk to scan + include
        # production deps. The tarball intentionally excludes node_modules
        # (too big to ship), so we resolve from package-lock.json here.
        # --omit=dev skips all devDeps (only prod deps land in the .exe
        # anyway, and main-app's devDep tree has an eslint peer conflict
        # that blocks npm ci). --omit=optional keeps optional
        # platform-specific binaries off the Windows runner. --ignore-scripts
        # skips gl's broken nan-shim postinstall.
        shell: pwsh
        working-directory: source
        # --legacy-peer-deps because main-app's devDep tree has an eslint
        # peer conflict (eslint-watch wants eslint <9, but eslint@9 is also
        # a devDep). npm ci validates peer deps across the FULL lockfile
        # even with --omit=dev, so we need this to get past the validation
        # step.
        #
        # Note: do NOT add --omit=optional. esbuild ships its platform-
        # specific binary as an optionalDependency (`@esbuild/win32-x64`).
        # Skipping optionals breaks tsx's TS transform at runtime with
        # "The package '@esbuild/win32-x64' could not be found" because
        # npm respects `os`/`cpu` filters anyway — macOS-only optionals
        # like fsevents don't install on Windows even without the flag.
        run: npm ci --omit=dev --ignore-scripts --legacy-peer-deps

      - name: Run electron-builder
        # The tarball ships with dist/studio-electron + dist/studio-client +
        # required node_modules (prod-only, with Windows prebuilds present).
        # We add --config.npmRebuild=false because the private repo already
        # handled native-dep resolution — rebuilding would fail anyway since
        # some deps have no node-gyp build path.
        shell: pwsh
        working-directory: source
        env:
          # No Windows code-signing cert yet — SmartScreen will warn on
          # first-launch. Same trade-off as unsigned Mac DMG pre-notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --config studio/electron-builder.json --win --x64 --config.npmRebuild=false

      - name: List build output
        shell: pwsh
        working-directory: source
        run: |
          Get-ChildItem release -Recurse -File | Select-Object FullName,Length | Format-Table

      - name: Smoke test packaged sidecar
        # Spawns the exact sidecar process the installed app would, using
        # the unpacked bundle electron-builder leaves at release/win-unpacked/.
        # Waits for the `config.load ok` milestone (proves tsx preflight +
        # ESM module resolution across app.asar worked) or fails with the
        # recent log tail. Catches TLA regressions, missing transitive deps
        # (get-tsconfig, @esbuild/win32-x64), and asar-resolution breakage
        # before we publish a broken .exe.
        shell: pwsh
        working-directory: source
        run: |
          $exe = "release\win-unpacked\Ugly Studio.exe"
          $tsx = "release\win-unpacked\resources\app.asar.unpacked\node_modules\tsx\dist\cli.mjs"
          $boot = "release\win-unpacked\resources\app.asar\studio\server\bootstrap.ts"
          $cwd = "release\win-unpacked\resources\app.asar.unpacked"
          foreach ($p in @($exe, $tsx, $cwd)) {
            if (-not (Test-Path $p)) { Write-Error "[smoke] missing: $p"; exit 1 }
          }
          $env:ELECTRON_RUN_AS_NODE = "1"
          $env:PORT = "0"
          $logFile = [IO.Path]::GetTempFileName()
          $proc = Start-Process -FilePath $exe -ArgumentList @($tsx, $boot) `
                                -WorkingDirectory $cwd `
                                -RedirectStandardOutput $logFile `
                                -RedirectStandardError "$logFile.err" `
                                -NoNewWindow -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          $ok = $false
          $fail = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
            $out = (Get-Content $logFile -ErrorAction SilentlyContinue) -join "`n"
            $err = (Get-Content "$logFile.err" -ErrorAction SilentlyContinue) -join "`n"
            $combined = "$out`n$err"
            if ($combined -match "MODULE_NOT_FOUND|ERR_MODULE_NOT_FOUND|Cannot find module|Cannot find package|Transform failed") {
              $fail = $true; break
            }
            if ($combined -match "config\.load ok") { $ok = $true; break }
            if ($proc.HasExited -and -not $ok) { $fail = $true; break }
          }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          $stdout = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
          $stderr = Get-Content "$logFile.err" -Raw -ErrorAction SilentlyContinue
          Write-Host "=== stdout (last 40 lines) ==="
          if ($stdout) { ($stdout -split "`n") | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
          Write-Host "=== stderr (last 40 lines) ==="
          if ($stderr) { ($stderr -split "`n") | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
          if ($fail -or -not $ok) {
            Write-Error "[smoke] FAIL — sidecar did not reach config.load"
            exit 1
          }
          Write-Host "[smoke] OK — sidecar reached config.load"

      - name: Create GitHub Release with installer
        # Tag = win-v<version>. If a release already exists (re-run), the
        # action updates it instead of failing.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win-v${{ inputs.version }}
          name: Windows Installer v${{ inputs.version }}
          body: |
            Unsigned Windows installer built from encrypted inputs pushed by the
            ugly-studio private repo. Downloaded, decrypted, and packaged on this
            runner at ${{ github.run_id }}.

            **This release is an intermediate artifact.** The authoritative
            distribution is at `https://ugly.bot/studio/releases/`. The private
            repo's publish pipeline pulls this `.exe` and uploads it to R2 +
            updates `studio-latest.json`.
          files: |
            source/release/*.exe
            source/release/*.blockmap
            source/release/latest.yml
          # Overwrite if tag exists — supports retry runs.
          fail_on_unmatched_files: true
