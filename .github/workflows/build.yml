name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      tarball_url:
        description: 'R2 presigned URL for encrypted source tarball (15 min TTL)'
        required: true
      version:
        description: 'Version string (must match the version in the tarballed package.json)'
        required: true
      skip_validation:
        description: 'When "true", skip the version-match guard + the packaged smokes. For fast-iteration publishes from main-app only — never use this for a release the public will consume.'
        required: false
        default: 'false'

# Gives the workflow token permission to create a release.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout this repo (workflow + decrypt script)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.2

      - name: Download encrypted tarball
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ inputs.tarball_url }}" -OutFile tarball.tar.gz.enc
          $size = (Get-Item tarball.tar.gz.enc).Length
          Write-Host "Downloaded $size bytes"

      - name: Decrypt
        shell: pwsh
        env:
          WIN_BUILD_ENCRYPTION_KEY: ${{ secrets.WIN_BUILD_ENCRYPTION_KEY }}
        run: node scripts/decrypt.mjs tarball.tar.gz.enc tarball.tar.gz

      - name: Extract
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path source | Out-Null
          tar -xzf tarball.tar.gz -C source
          Get-ChildItem source | Format-Table -AutoSize

      - name: Verify version matches input
        if: inputs.skip_validation != 'true'
        shell: pwsh
        run: |
          $pkg = Get-Content source/package.json -Raw | ConvertFrom-Json
          if ($pkg.version -ne "${{ inputs.version }}") {
            Write-Error "Tarball package.json version ($($pkg.version)) does not match input (${{ inputs.version }})"
            exit 1
          }
          Write-Host "Version check OK: $($pkg.version)"

      - name: Install deps
        # ugly-studio is a pnpm project (pnpm-lock.yaml + .npmrc with
        # node-linker=hoisted, both shipped in the tarball). We install the
        # FULL tree (incl. devDeps) so `pnpm exec electron-builder` is
        # available — unlike `npx`, `pnpm exec` won't auto-fetch it. pnpm
        # tolerates the eslint peer conflict that blocked `npm ci`, so no
        # --legacy-peer-deps is needed. --ignore-scripts skips gl's broken
        # nan-shim postinstall + Playwright's browser download. esbuild's
        # @esbuild/win32-x64 optional installs because npm/pnpm honor os/cpu
        # filters. electron-builder still packs only prod deps into the .exe.
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run electron-builder
        # dist/studio-electron + dist/studio-client are pre-built in the
        # tarball. --config.npmRebuild=false because the private repo already
        # handled native-dep resolution — rebuilding would fail anyway since
        # some deps have no node-gyp build path.
        shell: pwsh
        working-directory: source
        env:
          # No Windows code-signing cert yet — SmartScreen will warn on
          # first-launch. Same trade-off as unsigned Mac DMG pre-notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --config electron-builder.json --win --x64 --config.npmRebuild=false

      - name: List build output
        shell: pwsh
        working-directory: source
        run: |
          Get-ChildItem release -Recurse -File | Select-Object FullName,Length | Format-Table

      - name: Smoke test packaged launch
        if: inputs.skip_validation != 'true'
        # Ugly Studio is now a browser-only app — the legacy backend sidecar
        # (server/bootstrap.ts) is gone. Launch the packaged .exe headless
        # (`--background`: no window, no login prompt) and wait for the
        # `window.ugly daemon registered` milestone. Reaching it proves the
        # esbuild-bundled Electron main loaded, app.whenReady fired, and the
        # native window.ugly daemon (node-pty / fs / process capabilities,
        # lazy-required from the asar) resolved — i.e. ESM/asar module
        # resolution across the packed bundle works. Catches missing
        # transitive deps + asar-resolution breakage before we ship a broken
        # .exe. We read the app's on-disk log (not stdout) because a GUI
        # Electron process on Windows does not attach console stdout; the log
        # filename is UTC-date-derived, so we glob the newest electron-*.log.
        shell: pwsh
        working-directory: source
        run: |
          $root = (Get-Location).Path
          $exe  = Join-Path $root "release\win-unpacked\Ugly Studio.exe"
          if (-not (Test-Path $exe)) { Write-Error "[smoke] missing: $exe"; exit 1 }
          $logDir = Join-Path $env:USERPROFILE ".ugly-studio\logs"
          # Start clean so we only ever read lines this launch appends.
          if (Test-Path $logDir) {
            Remove-Item "$logDir\electron-*.log" -Force -ErrorAction SilentlyContinue
          }
          function Read-AppLog {
            if (-not (Test-Path $logDir)) { return "" }
            $f = Get-ChildItem "$logDir\electron-*.log" -ErrorAction SilentlyContinue |
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($f) { return (Get-Content $f.FullName -Raw -ErrorAction SilentlyContinue) }
            return ""
          }
          $proc = Start-Process -FilePath $exe -ArgumentList @("--background") -PassThru
          $deadline = (Get-Date).AddSeconds(90)
          $ok = $false; $fail = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
            $log = Read-AppLog
            if ($log -match "MODULE_NOT_FOUND|ERR_MODULE_NOT_FOUND|Cannot find module|Cannot find package|Transform failed|does not provide an export|Failed to start:") {
              $fail = $true; break
            }
            if ($log -match "window\.ugly daemon registered") { $ok = $true; break }
            if ($proc.HasExited -and -not $ok) { $fail = $true; break }
          }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          Get-Process "Ugly Studio" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "=== app log (last 40 lines) ==="
          $log = Read-AppLog
          if ($log) { ($log -split "`n") | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
          if ($fail -or -not $ok) {
            Write-Error "[smoke] FAIL — did not reach 'window.ugly daemon registered'"
            exit 1
          }
          Write-Host "[smoke] OK — reached 'window.ugly daemon registered'"

      - name: Smoke test packaged bash tools
        if: inputs.skip_validation != 'true'
        # Spawns the packaged Electron exec under ELECTRON_RUN_AS_NODE,
        # awaits ensureBinaries() (downloads git/node/pnpm/uv/python +
        # ffmpeg/imagemagick/pandoc/pdftotext/jq/yq/sqlite3/yt-dlp/pup
        # into ~/.ugly-studio/binaries/), then runs each
        # platform-supported tool through a sealed bash session and
        # asserts the spec version string appears in stdout. Also runs
        # `ugly-studio --help`, `pwd`, and `ls /c` to prove the sealed
        # shell + CLI entry both bootstrap. This is also our cross-platform
        # module-resolution guard: it loads the app's bundled TS from the
        # asar via tsx under the packaged Electron, catching Windows-specific
        # regressions the launch smoke can't see — MSYS2 bash.exe path
        # resolution, MAGICK_HOME injection, .exe suffix handling, and
        # win32-arm64 → x64 fallbacks for uv/python.
        shell: pwsh
        working-directory: source
        run: pnpm exec tsx scripts/smoke-packaged-bash-tools.ts

      - name: Create GitHub Release with installer
        # Tag = win-v<version>. If a release already exists (re-run), the
        # action updates it instead of failing.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win-v${{ inputs.version }}
          name: Windows Installer v${{ inputs.version }}
          body: |
            Unsigned Windows installer built from encrypted inputs pushed by the
            ugly-studio private repo. Downloaded, decrypted, and packaged on this
            runner at ${{ github.run_id }}.

            **This release is an intermediate artifact.** The authoritative
            distribution is at `https://ugly.bot/studio/releases/`. The private
            repo's publish pipeline pulls this `.exe` and uploads it to R2 +
            updates `studio-latest.json`.
          files: |
            source/release/*.exe
            source/release/*.blockmap
            source/release/latest.yml
          # Overwrite if tag exists — supports retry runs.
          fail_on_unmatched_files: true
